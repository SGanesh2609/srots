# ══════════════════════════════════════════════════════════════════════════════
# SROTS Backend — application-dev.properties  (active in dev/local only)
# Activate with: --spring.profiles.active=dev
# ══════════════════════════════════════════════════════════════════════════════

# ── Verbose SQL / application logging (development only) ──────────────────────
logging.level.com.srots=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ── Actuator: expose all endpoints in dev for easy debugging ──────────────────
management.endpoints.web.exposure.include=health,metrics,prometheus,info,env,beans,mappings

# ── JPA: show SQL in console ──────────────────────────────────────────────────
spring.jpa.show-sql=true
