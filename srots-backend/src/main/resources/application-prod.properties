# ══════════════════════════════════════════════════════════════════════════════
# SROTS Backend — application-prod.properties  (active in production only)
# Activate with: --spring.profiles.active=prod  (or via SPRING_PROFILES_ACTIVE env var)
# ══════════════════════════════════════════════════════════════════════════════

# ── Logging: production-level only (no SQL trace) ─────────────────────────────
logging.level.com.srots=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.root=WARN

# ── Actuator: restrict to health only in production ───────────────────────────
# metrics/prometheus should be behind a separate internal port or auth
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# ── JPA: no console SQL in production ─────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Error messages: do not leak internals ─────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
