# ══════════════════════════════════════════════════════════════════════════════
# SROTS Backend — application.properties
# ══════════════════════════════════════════════════════════════════════════════

# Server
server.port=8081
spring.application.name=srots-backend

# ── Logging / Kibana ──────────────────────────────────────────────────────────
# Log files are written to ./logs/ by default.
# Override with environment variable: LOG_PATH=/var/log/srots
# ─────────────────────────────────────────────────────────────────────────────

# ── Cleanup Scheduler Configuration ──────────────────────────────────────────
srots.cleanup.premium-expiry-days=90
srots.cleanup.post-retention-days=90
srots.cleanup.event-notice-retention-days=120
srots.cleanup.soft-delete-retention-days=60
srots.cleanup.scheduler-cron=0 0 9 * * *
srots.cleanup.scheduler-timezone=Asia/Kolkata
srots.cleanup.job-deadline-reminder-days=5
srots.cleanup.premium-warning-start-days=10
srots.cleanup.premium-warning-end-days=20
# ─────────────────────────────────────────────────────────────────────────────

server.error.include-message=always

# ── Database (MySQL) ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/srots_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ganesh@2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP Connection Pool (tuned for 4K-6K concurrent users) ──────────────
# With 50 max connections and MySQL, we can support ~500 concurrent DB queries
# at a time. Most requests complete in <100ms, so 50 connections handles ~5000 rps.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.pool-name=SrotsHikariPool
# ─────────────────────────────────────────────────────────────────────────────

# ── Metrics & Monitoring ──────────────────────────────────────────────────────
# Base: expose health publicly + metrics/prometheus for authenticated ADMIN/SROTS_DEV.
# Access to /actuator/** (except /actuator/health) is enforced in SecurityConfig.
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
# ─────────────────────────────────────────────────────────────────────────────

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# ─────────────────────────────────────────────────────────────────────────────

# ── Mail Configuration (Gmail) ────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:suddalaganesh1239@gmail.com}
spring.mail.password=${MAIL_PASSWORD:mtou afry tton gybj}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=false
# ─────────────────────────────────────────────────────────────────────────────

# ── JWT Configuration ─────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MA==}
app.jwt.expiration-ms=8000000
# ─────────────────────────────────────────────────────────────────────────────

# ── File Upload (size limits per file type) ───────────────────────────────────
# Global hard cap — individual type limits enforced in FileValidationService
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.location=${java.io.tmpdir}
# Application-level limits (used by FileValidationService)
srots.upload.max-resume-size-mb=5
srots.upload.max-profile-photo-size-mb=2
srots.upload.max-bulk-upload-size-mb=50
srots.upload.max-post-attachment-size-mb=10
srots.upload.allowed-resume-types=application/pdf
srots.upload.allowed-photo-types=image/jpeg,image/png,image/webp
srots.upload.allowed-document-types=application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document
srots.upload.allowed-bulk-types=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,application/csv
# ─────────────────────────────────────────────────────────────────────────────

# ── CORS ──────────────────────────────────────────────────────────────────────
# Override via environment variable in production:
#   CORS_ORIGINS=https://srots.in,https://app.srots.in
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
# ─────────────────────────────────────────────────────────────────────────────

# ── Redis Cache ───────────────────────────────────────────────────────────────
# Redis is used for distributed caching (college list, analytics, student profiles).
# Set REDIS_HOST / REDIS_PORT in production environment.
# If Redis is unavailable, the application falls back to no-cache (safe degradation).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms
# Spring Cache — uses Redis when available
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate Limiting ─────────────────────────────────────────────────────────────
# Tokens per minute per IP address
srots.rate-limit.login-requests-per-minute=10
srots.rate-limit.public-requests-per-minute=30
srots.rate-limit.api-requests-per-minute=120
# ─────────────────────────────────────────────────────────────────────────────

# ── Graceful Shutdown ─────────────────────────────────────────────────────────
# Allows in-flight requests to complete before the server stops.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# ─────────────────────────────────────────────────────────────────────────────

# ── Flyway Migrations ─────────────────────────────────────────────────────────
spring.flyway.enabled=false
# ─────────────────────────────────────────────────────────────────────────────

# ── Logging (base level — overridden by profile-specific files) ───────────────
# For DEBUG SQL logging use --spring.profiles.active=dev  (application-dev.properties)
# For production silence use --spring.profiles.active=prod (application-prod.properties)
logging.level.com.srots=INFO
logging.level.org.hibernate.SQL=WARN
# ─────────────────────────────────────────────────────────────────────────────
